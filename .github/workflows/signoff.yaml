name: signoff

on:
  push:
  workflow_dispatch:

jobs:
  signoff:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system packages
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog verilator yosys z3 boolector build-essential

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt click

      - name: Install SymbiYosys
        shell: bash
        run: |
          git clone --depth 1 https://github.com/YosysHQ/sby.git /tmp/sby
          cd /tmp/sby
          sudo make install PREFIX=/usr/local

      - name: Install sky130 PDK
        uses: TinyTapeout/ciel-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          pdk_name: sky130A
          pdk_version: 8afc8346a57fe1ab7934ba5a6056ea8b43078e71
          pdk_root: /home/runner/pdk

      - name: Set PDK environment
        shell: bash
        run: |
          echo "PDK_ROOT=/home/runner/pdk" >> "$GITHUB_ENV"
          echo "SKY130A=/home/runner/pdk/sky130A" >> "$GITHUB_ENV"

      - name: Run signoff verification
        shell: bash
        run: |
          make test-golden
          make test-rtl
          make test-comprehensive
          make lint-iverilog
          make lint-verilator
          make synth-gate-netlist
          make test-gatelevel-smoke
          make formal-all

      - name: Upload signoff artifacts
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: signoff-artifacts
          path: |
            docs/signoff_checklist.md
            docs/bringup_checklist.md
            docs/lint_waivers.md
            test/results.xml
            test/tb.fst
            formal/*/*
